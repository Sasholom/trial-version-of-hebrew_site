<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaSholom AI</title>

  <!-- ===== SEO ===== -->
  <meta name="description" content="AI‑портал SaSholom: задавай вопросы, загружай фото, выбирай персонажа">
  <meta name="keywords" content="AI, чат, иврит, благословения, фото, персонажи">
  <meta name="author" content="SaSholom">
  <meta name="robots" content="index, follow">

  <!-- ===== OPEN GRAPH (соцсети) ===== -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sasholomsite.vercel.app/">
  <meta property="og:title" content="SaSholom AI — умный помощник с персонажами">
  <meta property="og:description" content="100+ AI‑персонажей, фото‑благословения, голосовой ввод и многое другое.">
  <meta property="og:image" content="https://sasholomsite.vercel.app/preview.png">
  <meta property="og:locale" content="ru_RU">

  <!-- ===== TWITTER CARD ===== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SaSholom AI — умный помощник с персонажами">
  <meta name="twitter:description" content="100+ AI‑персонажей, фото‑благословения, голосовой ввод.">
  <meta name="twitter:image" content="https://sasholomsite.vercel.app/preview.png">

  <!-- ===== ТЕМА И PWA ===== -->
  <meta name="theme-color" content="#2a5298">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <!-- ===== ШРИФТЫ ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">

  <!-- ===== БИБЛИОТЕКИ (CDN) ===== -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== КНОПКИ ТЕМЫ И ЯЗЫКА ===== -->
  <button id="theme-toggle" class="theme-toggle" data-i18n-title="themeTitle">🌓</button>
  <button id="lang-toggle" class="theme-toggle lang-toggle" data-i18n-title="langTitle">🌐 RU</button>

  <h1 data-i18n="title">🚀 SaSholom</h1>

  <div class="card">
    <h2 data-i18n="cardTitle">🧠 Hebrew AI</h2>

    <!-- ===== ВЫБОР ПРОВАЙДЕРА (GPT / Gemini) ===== -->
    <div class="provider-switcher">
      <button class="provider-btn active" data-provider="chadgpt"><i data-lucide="cpu"></i> GPT</button>
      <button class="provider-btn" data-provider="gemini"><i data-lucide="sparkles"></i> Gemini</button>
    </div>

    <!-- ===== ВЫБОР ПЕРСОНАЖА (опции наполняет js/main.js) ===== -->
    <div class="character-panel">
      <div class="character-selectors">
        <select id="category-select" class="preset-select"></select>
        <select id="character-select" class="preset-select"></select>
      </div>
      <button class="preset-btn active" id="default-char-btn" data-i18n="defaultMode">💬 Обычный</button>
    </div>

    <!-- ===== ПОЛЕ ВВОДА С ИНСТРУМЕНТАМИ ===== -->
    <div class="input-wrapper">
      <textarea id="ai-question" data-i18n-placeholder="placeholder" placeholder="Задай любой вопрос..." maxlength="2000"></textarea>
      <button id="voice-btn" class="icon-btn" data-i18n-title="voiceTitle"><i data-lucide="mic"></i></button>
      <button id="lang-btn" class="icon-btn" data-i18n-title="voiceLangTitle">🇷🇺 RU</button>
      <input type="file" id="image-input" accept="image/*" style="display:none">
      <button id="image-btn" class="icon-btn" data-i18n-title="imageTitle"><i data-lucide="image"></i></button>
      <button id="camera-btn" class="icon-btn" data-i18n-title="cameraTitle"><i data-lucide="camera"></i></button>
      <input type="file" id="file-input" accept=".txt,.pdf" style="display:none">
      <button id="file-btn" class="icon-btn" data-i18n-title="fileTitle"><i data-lucide="file-text"></i></button>
    </div>

    <!-- ===== ПРЕВЬЮ ФОТО ===== -->
    <div id="image-preview" class="image-preview" style="display:none">
      <img id="preview-img" src="" alt="Превью">
      <button id="remove-preview" class="remove-preview"><i data-lucide="x"></i></button>
    </div>

    <!-- ===== КНОПКИ ОТПРАВКИ И ОЧИСТКИ ===== -->
    <button id="ai-ask-btn" data-i18n="askBtn">Спросить 💬</button>
    <button id="clear-chat-btn" data-i18n="clearBtn">🗑️ Очистить</button>

    <!-- ===== ИНСТРУМЕНТЫ ЧАТА (экспорт, поиск, счётчик, заметки) ===== -->
    <div class="chat-tools">
      <button id="export-btn" class="tool-btn"><i data-lucide="download"></i> <span data-i18n="exportBtn">Экспорт</span></button>
      <input type="text" id="search-input" class="search-input" data-i18n-placeholder="searchPlaceholder" placeholder="Поиск...">
      <span id="counter" class="counter">0</span>
      <button id="notes-btn" class="tool-btn"><i data-lucide="notepad-text"></i> <span data-i18n="notesBtn">Заметки</span></button>
    </div>

    <!-- ===== ПАНЕЛЬ ЗАМЕТОК (имя, предпочтения) ===== -->
    <div id="notes-panel" class="notes-panel" style="display:none">
      <label><span data-i18n="notesName">Имя:</span> <input type="text" id="note-name"></label>
      <label><span data-i18n="notesPrefs">Предпочтения:</span> <textarea id="note-prefs" rows="2"></textarea></label>
      <button id="save-notes-btn" data-i18n="notesSave">Сохранить</button>
    </div>

    <!-- ===== ИСТОРИЯ ЧАТА (сообщения добавляет js/chat.js) ===== -->
    <div id="chat-history"></div>
  </div>

  <!-- ===== ФУТЕР ===== -->
  <footer>Made with <span>💚</span> by S.K.</footer>

  <!-- ===== ОСНОВНОЙ СКРИПТ (ES-модули, см. js/main.js) ===== -->
  <script type="module" src="js/main.js"></script>

  <!-- ===== SERVICE WORKER (PWA) ===== -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
